version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: bravapos_db
      POSTGRES_USER: bravapos_user
      POSTGRES_PASSWORD: bravapos_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    restart: always

  backend:
    build: .
    command: daphne -b 0.0.0.0 -p 8000 core.asgi:application
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=postgres://bravapos_user:bravapos_password@db:5432/bravapos_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./pos-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: tu_base_datos
      POSTGRES_USER: tu_usuario
      POSTGRES_PASSWORD: tu_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    restart: always

  backend:
    build: ./carpeta_django # ⚠️ Cambia esto por el nombre de tu carpeta Django
    command: daphne -b 0.0.0.0 -p 8000 tu_proyecto.asgi:application # ⚠️ Cambia "tu_proyecto"
    volumes:
      - ./carpeta_django:/app
    environment:
      - DATABASE_URL=postgres://tu_usuario:tu_password@db:5432/tu_base_datos
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  frontend:
    build: ./carpeta_react # ⚠️ Cambia esto por el nombre de tu carpeta React
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
name: Deploy Brava POS

on:
  push:
    branches:
      - V2-Estable-Cloud

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔔 Notificar inicio
        run: |
          curl -s -H "Content-Type: application/json" \
          -d '{"content": "🚀 Iniciando deploy de Brava POS..."}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: 📦 Backup y Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          command_timeout: 15m
          script: |
            cd BravaPos-Comercial

            echo "--- Haciendo backup de la BD ---"
            sudo docker compose exec -T db pg_dump --clean -U bravapos_user bravapos_db > pre_deploy.sql

            echo "--- Pulling código nuevo ---"
            git pull origin V2-Estable-Cloud

            # ✨ AQUÍ ESTÁ LA MAGIA ANTI-FANTASMAS
            echo "--- Destruyendo caché viejo del frontend ---"
            sudo docker compose build --no-cache frontend
            
            echo "--- Levantando servicios ---"
            sudo docker compose up -d --build

            echo "--- Esperando que el backend esté listo ---"
            sleep 8

            echo "--- Verificando que el backend esté corriendo ---"
            if ! sudo docker compose ps backend | grep -q "Up"; then
              echo "❌ El backend no está corriendo. Logs:"
              sudo docker compose logs --tail=80 backend
              exit 1
            fi

            echo "--- Logs del backend (últimas 30 líneas) ---"
            sudo docker compose logs --tail=30 backend

            echo "--- Ejecutando migraciones ---"
            sudo docker compose exec -T backend python manage.py migrate

            echo "--- ✅ Deploy completado ---"

      - name: ❌ Mostrar logs y hacer rollback si falla
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd BravaPos-Comercial

            echo "=== LOGS DEL BACKEND ==="
            sudo docker compose logs --tail=100 backend

            echo "=== LOGS DEL FRONTEND ==="
            sudo docker compose logs --tail=30 frontend

            echo "=== Iniciando rollback de BD ==="
            cat pre_deploy.sql | sudo docker compose exec -T db psql -U bravapos_user bravapos_db
            echo "=== Rollback completado ==="

      - name: ❌ Notificar fallo
        if: failure()
        run: |
          curl -s -H "Content-Type: application/json" \
          -d '{"content": "⚠️ Deploy falló. Rollback ejecutado. Revisa los logs en GitHub Actions."}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: ✅ Notificar éxito
        if: success()
        run: |
          curl -s -H "Content-Type: application/json" \
          -d '{"content": "✅ Brava POS actualizado con éxito 🚀"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
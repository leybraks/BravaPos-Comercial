name: Deploy Brava POS

on:
  push:
    branches:
      - V2-Estable-Cloud

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🔔 Notificar inicio
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚀 Iniciando deploy de Brava POS..."}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: 📦 Backup y Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd BravaPos-Comercial

            # Backup
            sudo docker compose exec -T db pg_dump -U bravapos_user bravapos_db > pre_deploy.sql

            # Deploy con rollback automático
            if ! (git pull origin V2-Estable-Cloud && \
                  sudo docker compose up -d --build && \
                  sudo docker compose exec -T backend python manage.py migrate); then

              echo "⚠️ Error. Iniciando rollback..."
              cat pre_deploy.sql | sudo docker compose exec -T db psql -U bravapos_user bravapos_db
              exit 1
            fi

      - name: ❌ Notificar rollback
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "⚠️ Deploy falló. Rollback ejecutado."}' \
          ${{ secrets.DISCORD_WEBHOOK }}

      - name: ✅ Notificar éxito
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "✅ Brava POS actualizado con éxito 🚀"}' \
          ${{ secrets.DISCORD_WEBHOOK }}